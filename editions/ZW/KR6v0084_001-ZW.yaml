body:
  text: 錄文八月一日念定光佛一千遍不墮刀山地獄讚曰聞說刀山不可攀嵯峨險峻使心酸遇逢齋日勤修福免見前程惡業牽日念藥師琉璃光佛千遍不墮鑊湯地獄勸君勤念藥師尊免向鑊湯受苦辛落在波中何時出早修淨土脫沈淪日念賢劫千佛一千遍不墮寒冰地獄就中最苦是寒冰蓋因裸露對神明但念諸佛求功德罪業消除好處生日念阿彌陀佛千遍不墮劍樹地獄讚曰聞說彌陀福最強殘劍樹消亡自作自招還自受莫待時手腳如來一千遍不墮拔舌地獄拔舌更使鐵牛耕萬種淩持不暫停要免閻王親叫問持念地藏一千聲假使熱鐵輪於我頂上旋終不以此苦退轉菩提心日念大勢至如來一千遍不墮毒蛇地獄讚曰菩薩慈悲廣大多救苦常教出愛河九品蓮花分沾有分毒蛇豈敢便相過日念觀音菩薩千遍不墮挫碓地獄讚曰斬身挫碓沒休時都緣造惡不修持觀音哀愍眾生苦免離地獄現慈悲大藏佛說出曜經佛言眾生習惡如鐵生垢頌曰如鐵生垢反食其身惡生於心還自害形佛語真實決定不虛日念盧舍那佛千遍不墮鋸解地獄如來功德大圓明由如朗月出群星但念能除多種罪鋸解無由敢用君日念藥王藥上菩薩千遍不墮鐵床地獄菩薩真名號藥王鐵床更用火燒烊直饒造業如山重但念眾名免眾殃日念釋迦牟尼佛一千遍不墮黑暗地獄讚曰持齋事佛好看經積善冥司註姓名更誦彌陀一千遍自然黑暗顯光明錄文完方廣錩修改審定附關於地藏菩薩十齋日張總地藏菩薩十齋日是個短小的儀範從敦煌寫本與大足石刻我們已看到其頗為豐富的類型變化說明了其在古代社會受到重視不斷演進的事實齋在佛教之中起源是很早的其梵語為音譯為烏甫沙他布薩陀婆略譯為布薩古印度吠陀時代以來即有祭禮在新月祭與滿月祭前一天行預備祭就稱為布薩屆時行斷食與住清淨之法並懺悔罪過潔淨身心佛陀時代尼乾子等外道亦用此法集會一處並持斷食四戒成為風氣因而佛陀也允許僧團采此法以行事齋在佛教中廣義是指清淨身心狹義原是特指過午不食釋氏要覽卷上稱佛教以過中不食名齋否則為非時食這種風習對俗眾影響也很大因為在家俗眾遵從的八關齋戒就是在特定時日遵守七項戒律並且持齋即不非時食持齋戒的日子就是齋日佛教對於齋日也有不同說法與規制如三齋日四齋日六齋日九齋日十齋日及長齋月等我們上舉的大乘四大齋日中就列出了四齋日六齋日與十齋日等佛經中關於齋日來歷也有不同說法約可歸結為兩種四天王與天帝釋於齋日下界巡視四天王經等諸鬼王在特定時日得勢伺機害人因而須持齋戒法苑珠林引天地本起經中國佛教自南北朝以來形成了將不殺生的戒律貫徹至素食的傳統因而持齋的含義有了從過午不食至素食的轉化從我們錄考的十齋日類的儀範來看強調了在齋日念誦佛菩薩之名的功德但某日某神下界的淵源是很清楚的此類儀範的繁簡不同模式相當清晰地反映出其演化的軌迹結合一些相關的經籍可以概括出其遞進的過程從此類經本中聯繫於玄奘法師與開元皇帝的傳說載記等等可推知其不會產生在初唐盛時說法最為完備的地藏菩薩十齋日約形成於盛唐以後並在相當時段內延續以下我們就約略地梳理其遞進的過程當然其中有些簡單形式未必產生在繁複形式之前但總體的發展過程與邏輯演進應不會有太大的失誤之處此儀範最簡化的第一種系統應在北京大學圖書館藏本所體現另兩個大乘四大齋日中亦包含有此形式即某日某某神下第二種系統數本分兩種錄文基本模式相同錄文二無題較錄文一增加了念佛菩薩名的內容錄文三兩本之相關內容均以玄奘法師之名為題如伯號首題為玄奘法師禮拜逐月有十齋日斯號雖屬佛說金剛經纂但相關部分有內題作玄奘法師禮拜逐月有十齋日從文本內容看錄文三增加出齋與界兩字因而此系統模式如下某日齋某某神下界念某佛或菩薩此系統兩種錄文內涵卻有不同處最重要處是斯號在閻羅王下時念觀世音菩薩而以玄奘法師題名的兩本在閻羅王天子下時念地藏菩薩其他數處也有次序的不同此種模式增加了念佛名的內容我們在相關的經文的斯號背面之十齋日儀軌中也可讀到關於念佛名咒的規定雖然其內容只是在每月三個日子裏分別念藥師阿彌陀釋迦三位佛之咒語其數與十齋日儀軌之定名並不相符第三種系統標為每月十齋日文本共有四件錄為兩種上海博物館號斯號以及斯號此三本文前都題有每月十齋日斯號則標題處已殘題前一行有每月惡日並是十齋日字樣這幾件寫本體現的典型齋儀模式為某日某某神下此日齋者不墮某某地獄但斯號又有特別處在不墮某某地獄後出現了戒禁眼耳口鼻諸感官之欲和除罪多少劫的內容而且此本多與十二月禮佛名相鄰其每月日禮佛後除罪免劫的內容為其後的範本汲收另一相關經文斯號齋日行事之中雖也只在每月的三天規定了念誦的規制但已出現了較完備的規制即某日齋念某佛某神降下不破齋者滅罪某某劫不墮某某地獄第四種系統情況是標為地藏菩薩十齋日的寫本此種寫本連藏文本共達七件斯號題地藏菩薩十齋日伯號題為地藏菩薩拾齋日斯號背面與斯號兩本都題為地藏菩薩經十齋日後者為縫繢裝題有甲戌年三十日三界寺僧沙彌法定師記耳國家圖書館發七號標題是地藏菩薩經十齋為法國所藏的藏文本其首尾皆殘但內容與上述的寫本情況是完全一致的是古藏文音譯漢字寫本長卷其中第至行為地藏菩薩十齋日的古藏文音譯本此種寫本的模式為某日某神下念某某佛菩薩不墮某某地獄持齋除罪某某劫此寫本之中斯號背後此十齋日不全只存五齋日國家圖書館所藏此本書寫十分精美這種模式不唯數量多有藏文本且因汲取了第二模式的念誦第三模式的不墮地獄及十二月禮佛名中的免罪多少劫而形成了最完備的模式第五種系統情況是標為大乘四齋日的寫本有斯號與伯號其斯號的內容中含有地藏菩薩十齋日僅除齋除罪某某劫與不墮某某地獄順序相反此種情況主要特徵是多種齋日彙集在地藏十齋日外還有一年中的大乘四齋日一年中的三長齋月十齋日與十二月禮多記等而伯號中則沒有地藏菩薩十齋日的內容但也與前本同樣有只講某日某神下的十齋日此題之下的模式較上種已無實質變化其特點只是將數個齋日規制集中論述第六系統模式見於大足石刻其特點是加上了讚詞與雕刻並雕造有豐富精妙的圖像前面部分則有簡化刪節具體體現為日念某佛菩薩不墮某某地獄讚詞某地獄雕刻此模式反映的特點在著名的敦煌寫本佛說十王經中也有出現佛說十王經之中也是讚詞與畫面相對應經中的插圖完全是依照讚詞而作出的佛說十王經本身亦題為成都府大聖慈寺沙門藏川所述因而其中能反映出唐以來佛教圖文之間的關係還有與十齋日性質相關的兩個寫本上面列第二三系統之中已有提及即斯號背面的十齋日儀軌與斯號齋日行事這兩本的內容雖不足十個齋日但性質卻與上述十齋日密切相關形制介於十齋日簡單模式與複雜模式之間因而此齋日儀範對說明十齋日或地藏菩薩十齋日的形成是十分有益的其中十齋日儀軌行文中僅說某日齋念某佛之咒後接咒文實際上此儀軌只講了三個日子即每月八日十五日與月盡日分別念藥師佛阿彌陀佛釋迦牟尼佛三個佛咒語的規制體現了某日念某佛的規則而齋日行事在關於八日十五日二十三日這三個齋日行事規範字句中八日齋念藥師光琉璃佛太子降下不破齋者滅罪一百二十劫不墮粉草地獄已體現出形態完備的模式另要注意的問題就是此地藏菩薩十齋日等往往與十二月禮佛文等相鄰其間也必有密切關係如下面之例上海博物館號中每月十齋日下接開元皇帝勸十齋讚十二月禮佛名上皇勸善斷肉文斯號佛勸十齋讚下接十二月禮佛名上皇勸善斷肉文每月十齋日斯號十二月禮多記下接每月十齋日斯號背每月十齋日下接十二月禮佛名伯號每月十齋日下接十二月禮佛文北京大學圖書館號每月十齋日下接十二月禮佛文斯號大乘四齋日下接年三長齋月六齋日十齋日地藏菩薩十齋日十二月禮佛文伯號大乘四齋日等諸齋曆下接十二月禮佛文因而在此將其中重要者一併錄出上博的開元皇帝勸十齋讚與斯佛勸十齋讚是完全相同的一首詩即每月十齋斷宰煞廣修善業度僧尼胎生化生勤念佛勇猛精進大慈悲上皇勸善斷肉文上博號為底本斯為校本稟性雖千種貪生共一般從頭皆覓活若個不求安怕急緣防箭高飛恐被彈炬堪鷹犬逐誰忍綱羅縵豬伏哀離圈羊牽惡出欄苦痛知何說忙迷如許難持刀咽不刺將肉口中食已言食肉者自割始嘗看十二月禮佛名與十二月禮多記內容也完全相同是說在一年的十二月各一天依制向某方禮拜可以得除罪多少劫之功效達滅罪修福的功能此段禮佛文的前後都強調玄奘法師並說此禮儀是玄奘為救眾生從十二部經中略出十齋日與此十二月禮佛文相鄰最多因而從其中汲取了除罪某某劫的內容也很自然了十齋日並且也染上了出自玄奘法師的一些色彩如斯號標題的又略每月惡日並是十齋日其又略就是玄奘又略出十齋日之意伯號直接標為玄奘法師禮佛十齋日而伯號在數種齋曆後總結道右上件齋月日是玄奘法師在十二部經中略出有人能滿三年每依時持齋禮拜所求必須抄本流轉除罪十萬六千六百劫例如伯號西京龍興寺玄奘法師於西國來大唐國有十二月禮佛日每月只在一日正月一日平明時向東方禮佛四拜除罪二百三十劫二月八日雞明平時向西方禮佛四拜除罪一百二十三月七日向西方禮佛四拜除罪一百四十劫四月八日向北方禮佛四拜除罪一百二十劫五月五日黃昏時向東方禮佛四拜除罪一千八百劫六月六日黃昏時向東方禮佛四拜除罪一千八百劫七月七日平明時向東方禮佛九拜除罪一千八百劫八月八日卯時向東方禮佛十拜除罪三萬三千劫九月十日寅時向東方禮佛九拜除罪一千八百劫十月一日卯時向南方禮佛九拜除罪一千劫十一月一日黃昏時向南方禮佛九拜除罪一千劫十二月十三日黃昏時向西方禮佛九拜除罪一千劫右件禮佛月日之時此是賢聖集會勸諸大地眾生一心於佛月日不得失時令諸眾生不求稱遂若能傳寫傳流與人除罪三萬九千六百劫若能教受一人受持除罪恒河沙數劫此十二月禮佛名中每個禮佛日遵制都能得到除罪多少劫的功德其文前的十齋日中卻無此內容而地藏菩薩十齋日的功德之中卻有除罪數劫說法其來源與此經本的關係已很清楚無誤了而上述勸十齋讚與勸善斷肉文則很明確地宣揚不殺生的思想並與每月十齋日直接相關這不但來源自佛教戒律而且肯定亦源於中國僧俗的素食傳統還須注意的是一些經典中對十齋日的提法與論述在地藏菩薩本願經的第六品中就列出了每月遵守的十齋日之時日並強調其日諸罪結集定其輕重因而閻浮提眾生在佛菩薩像前誦本經可得福報永離惡趣地藏菩薩發心因緣十王經中也有在某齋日念某佛的例制地藏菩薩本願經如來讚歎品第六中佛對普廣菩薩說地藏菩薩利益人天福德之事時說到復次普廣若未來世眾生於月一日八日十四日十五日十八日二十三二十四二十八二十九乃至三十日是諸日等諸罪結集定其輕重南閻浮提眾生舉止動念無不是業無不是罪能於是十齋日對佛菩薩諸賢聖像前讀是經一遍東西南北百由旬內無諸災難當此居家若長若幼現在未來百千歲中永離惡趣能於十齋日每轉一遍現世今此居家無諸橫病衣食豐溢地藏菩薩發心因緣十王經刊於日本卍續藏冊中其中第五閻魔王國內容中有生於十齋日受持十戒存當苦悲一日至心進念定光佛八日至心進念藥師琉璃光如來十四日至心進念賢劫千佛十五日至心進念阿彌陀佛十八日至心進念地藏菩薩從旦至食供養稱名必定不受四惡道苦二十三日至心進念勢至菩薩二十四日至心敬念觀世音菩薩二十八日至心進念毗盧遮那如來二十九日至心進念藥王菩薩三十日至心進念釋迦牟尼佛由此可知地藏菩薩本願經強調了在十齋日念此經的功德其中提到了十齋日其諸罪結集定其輕重的說法應是來自四天王經並而地藏十王經則談到了三長月並述及在十個齋日念佛菩薩名號的規定在上舉的斯號十齋日後面還特意強調了持齋之時間即其時節注意齋後午前即下至時千萬努力念佛修善慎之勿使察錄負罪愆誰能相救從以上諸形式的各本的模式遞進表現以及相關經典與寫本的情況可以知道由十齋日到地藏菩薩十齋日的脈絡演進已很清晰地藏菩薩十齋日不僅從使這個簡單儀範達到了完備而且將其中地藏菩薩的地位提升到相當地位這些經本之中有些地藏菩薩是與太山府君相聯繫有些又與閻羅天王相關聯而大足石刻十地獄之上主體就雕刻出了地藏菩薩巨像總之從唐宋時代地藏菩薩十齋日的演進圖文之間相聯繫也可具體見出地藏信仰的繁盛
